<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>3D Model Viewer &amp; AR Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#d3e4fe",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary-fixed-variant": "#3f465c",
                        "surface-container-high": "#dce9ff",
                        "primary-container": "#131b2e",
                        "secondary-container": "#6cf8bb",
                        "on-surface-variant": "#45464d",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#0b1c30",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-bright": "#f8f9ff",
                        "inverse-primary": "#bec6e0",
                        "surface-tint": "#565e74",
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "surface-container": "#e5eeff",
                        "on-background": "#0b1c30",
                        "on-secondary-fixed": "#002113",
                        "inverse-surface": "#213145",
                        "outline": "#76777d",
                        "tertiary-fixed": "#e0e3e5",
                        "error": "#ba1a1a",
                        "tertiary-container": "#191c1e",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#131b2e",
                        "surface": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#7c839b",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c6c6cd",
                        "on-secondary": "#ffffff",
                        "secondary": "#006c49",
                        "surface-dim": "#cbdbf5",
                        "on-tertiary-container": "#818486",
                        "on-secondary-container": "#00714d",
                        "primary-fixed": "#dae2fd",
                        "on-tertiary-fixed": "#191c1e",
                        "background": "#f8f9ff",
                        "tertiary": "#000000",
                        "primary-fixed-dim": "#bec6e0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-lg": "24px",
                        "section-padding": "40px",
                        "stack-gap-sm": "8px",
                        "container-margin": "20px",
                        "stack-gap-md": "16px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-md": ["Manrope"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Manrope"],
                        "body-md": ["Inter"],
                        "title-sm": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-sm": ["16px", { "lineHeight": "24px", "fontWeight": "500", "letterSpacing": "-0.01em" }]
                    }
                }
            }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        body {
            min-height: max(884px, 100dvh);
            font-family: 'Inter', sans-serif;
        }
        .font-manrope { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-lg text-body-lg h-screen w-screen overflow-hidden flex flex-col antialiased">
<!-- TopAppBar -->
<header class="bg-white/90 dark:bg-slate-950/90 backdrop-blur-md fixed top-0 w-full z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm pt-safe">
<div class="flex justify-between items-center px-5 h-16 w-full">
<button class="text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all active:scale-95 duration-150 flex items-center justify-center p-2 -ml-2 rounded-full focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-lg text-slate-900 dark:text-slate-50 truncate mx-4 flex-1 text-center">
                Furniture AI
            </h1>
<button class="text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 transition-all active:scale-95 duration-150 flex items-center justify-center p-2 -mr-2 rounded-full focus:outline-none focus:ring-2 focus:ring-emerald-500/50">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
</button>
</div>
</header>
<!-- Main Viewport (3D Viewer) -->
<main class="flex-1 relative w-full h-full bg-surface-container-lowest overflow-hidden">
<!-- 3D Model Placeholder Image -->
<div class="absolute inset-0 w-full h-full">
<img alt="3D Model View" class="w-full h-full object-cover object-center" data-alt="high quality 3D render of a modern minimalist mid-century lounge chair on a clean white infinite background with soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3B0ALnNm4W4FYS11o7I0JiS5X3QCt7XqklvFTyjZ57_EplIXk-wWu9m0TkH0GfjEA7mGwhv_NvWR1Vg8-xGt3IM4PKVpIa0_NxaJiwPu1Z5UUojuW9aLi2tzxluuMObM0Eh_c5knbefOQiUk8p42qym3rKsqnImITp1439GaNqBhx1OPY5GyrgYTkC6SHk1YvEKzb7QcsRqRKxcc4TXZA-g_CULNp6h7PsqjRIuVa-jbu6arYdZrUoinzZmO5eJ_K8I7vEdoZ-JQ"/>
<!-- Vignette overlay for depth -->
<div class="absolute inset-0 bg-gradient-to-b from-black/5 via-transparent to-black/20 pointer-events-none"></div>
</div>
<!-- Scanning Line Indicator -->
<div class="absolute top-1/4 left-0 w-full h-1 bg-emerald-500/30 blur-sm pointer-events-none shadow-[0_0_15px_rgba(16,185,129,0.5)] transform -translate-y-1/2"></div>
<div class="absolute top-1/4 left-0 w-full h-[1px] bg-emerald-400 pointer-events-none transform -translate-y-1/2"></div>
<!-- Gestural hints -->
<div class="absolute inset-x-0 top-32 flex justify-center pointer-events-none z-10">
<div class="bg-slate-900/80 backdrop-blur-md rounded-full px-5 py-2.5 flex items-center gap-2.5 shadow-lg border border-white/10">
<span class="material-symbols-outlined text-white text-sm" data-icon="swipe">swipe</span>
<span class="font-body-md text-body-md text-white font-medium">Swipe to rotate, pinch to zoom</span>
</div>
</div>
<!-- Floating Action Button (AR View) -->
<div class="absolute bottom-32 left-0 right-0 flex justify-center z-20 px-container-margin pointer-events-auto">
<button class="bg-emerald-600 text-white shadow-[0_12px_24px_rgba(5,150,105,0.25)] hover:bg-emerald-700 active:scale-[0.98] transition-all duration-300 rounded-full w-full max-w-xs h-14 flex items-center justify-center gap-3 backdrop-blur-md focus:outline-none focus:ring-4 focus:ring-emerald-500/30 font-title-sm text-title-sm">
<span class="material-symbols-outlined" data-icon="view_in_ar">view_in_ar</span>
<span>View in your Space</span>
</button>
</div>
<!-- Subtle model info overlay bottom left -->
<div class="absolute bottom-32 left-5 z-10 hidden md:block">
<div class="bg-white/80 backdrop-blur-xl rounded-2xl p-5 shadow-xl border border-white/40">
<h3 class="font-manrope font-bold text-headline-md text-on-surface mb-0.5">Eames Lounge</h3>
<p class="font-body-md text-on-surface-variant font-medium">Mid-Century Modern</p>
<div class="mt-4 flex gap-3">
<div class="w-7 h-7 rounded-full bg-[#3a2818] border-2 border-white shadow-md ring-1 ring-black/5"></div>
<div class="w-7 h-7 rounded-full bg-[#1a1a1a] border-2 border-transparent shadow-md ring-1 ring-black/5"></div>
<div class="w-7 h-7 rounded-full bg-[#f5f5dc] border-2 border-transparent shadow-md ring-1 ring-black/5"></div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-white/95 dark:bg-slate-950/95 backdrop-blur-md fixed bottom-0 w-full z-50 pb-safe border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_16px_rgba(0,0,0,0.06)] md:hidden">
<div class="flex justify-around items-center h-20 w-full px-4">
<!-- History -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-emerald-600 dark:hover:text-emerald-400 active:scale-90 transition-all duration-200 focus:outline-none">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="history">history</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.1em]">History</span>
</button>
<!-- Viewer (Active) -->
<button class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 bg-emerald-50/80 dark:bg-emerald-950/40 rounded-full px-6 py-2.5 active:scale-90 transition-all duration-200 focus:outline-none">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="view_in_ar" data-weight="fill" style="font-variation-settings: 'FILL' 1;">view_in_ar</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.1em]">Viewer</span>
</button>
<!-- Account -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-2 hover:text-emerald-600 dark:hover:text-emerald-400 active:scale-90 transition-all duration-200 focus:outline-none">
<span class="material-symbols-outlined mb-1 text-2xl" data-icon="person">person</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.1em]">Account</span>
</button>
</div>
</nav>
</body></html>
