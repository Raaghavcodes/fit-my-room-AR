<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Furniture AI - Photo Capture</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#d3e4fe",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary-fixed-variant": "#3f465c",
                        "surface-container-high": "#dce9ff",
                        "primary-container": "#131b2e",
                        "secondary-container": "#6cf8bb",
                        "on-surface-variant": "#45464d",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#0b1c30",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-fixed-variant": "#444749",
                        "surface-bright": "#f8f9ff",
                        "inverse-primary": "#bec6e0",
                        "surface-tint": "#565e74",
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "surface-container": "#e5eeff",
                        "on-background": "#0b1c30",
                        "on-secondary-fixed": "#002113",
                        "inverse-surface": "#213145",
                        "outline": "#76777d",
                        "tertiary-fixed": "#e0e3e5",
                        "error": "#ba1a1a",
                        "tertiary-container": "#191c1e",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#131b2e",
                        "surface": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#7c839b",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c6c6cd",
                        "on-secondary": "#ffffff",
                        "secondary": "#006c49",
                        "surface-dim": "#cbdbf5",
                        "on-tertiary-container": "#818486",
                        "on-secondary-container": "#00714d",
                        "primary-fixed": "#dae2fd",
                        "on-tertiary-fixed": "#191c1e",
                        "background": "#f8f9ff",
                        "tertiary": "#000000",
                        "primary-fixed-dim": "#bec6e0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-lg": "24px",
                        "section-padding": "40px",
                        "stack-gap-sm": "8px",
                        "container-margin": "20px",
                        "stack-gap-md": "16px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "headline-md": ["Manrope"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Manrope"],
                        "body-md": ["Inter"],
                        "title-sm": ["Manrope"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar Shared Component -->
<header class="fixed top-0 w-full z-50 bg-white/90 dark:bg-slate-950/90 backdrop-blur-md shadow-sm border-b border-slate-100 dark:border-slate-800 flex justify-between items-center px-5 h-16">
<button class="text-emerald-600 dark:text-emerald-400 hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150 flex items-center justify-center p-2 -ml-2 rounded-full" type="button">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-lg font-bold text-slate-900 dark:text-slate-50 font-manrope font-semibold tracking-tight">
            Furniture AI
        </h1>
<button class="text-emerald-600 dark:text-emerald-400 hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150 flex items-center justify-center p-2 -mr-2 rounded-full" type="button">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-[88px] pb-[104px] px-container-margin flex flex-col min-h-screen max-w-md mx-auto relative">
<!-- Header Text -->
<div class="mb-stack-gap-lg text-center mt-4">
<h2 class="font-headline-md text-headline-md text-on-background">Capture Views</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Provide all angles for optimal AI reconstruction.</p>
</div>
<!-- 2x2 Photo Input Grid -->
<div class="grid grid-cols-2 gap-stack-gap-md mb-section-padding">
<!-- Front View Slot (Required) -->
<button class="relative aspect-square rounded-xl bg-surface-container border-2 border-dashed border-outline-variant hover:border-outline hover:bg-surface-container-high transition-all duration-200 flex flex-col items-center justify-center gap-stack-gap-sm group overflow-hidden" type="button">
<div class="absolute top-3 left-3 bg-primary text-on-primary px-2 py-1 rounded-[4px] font-label-caps text-label-caps uppercase tracking-wider z-10 shadow-sm">
                    Required
                </div>
<div class="h-12 w-12 rounded-full bg-surface-container-highest flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-outline" data-icon="add">add</span>
</div>
</button>
<!-- Back View Slot -->
<button class="relative aspect-square rounded-xl bg-surface-container border-2 border-dashed border-outline-variant hover:border-outline hover:bg-surface-container-high transition-all duration-200 flex flex-col items-center justify-center gap-stack-gap-sm group overflow-hidden" type="button">
<div class="h-12 w-12 rounded-full bg-surface-container-highest flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-outline" data-icon="add">add</span>
</div>
</button>
<!-- Left View Slot -->
<button class="relative aspect-square rounded-xl bg-surface-container border-2 border-dashed border-outline-variant hover:border-outline hover:bg-surface-container-high transition-all duration-200 flex flex-col items-center justify-center gap-stack-gap-sm group overflow-hidden" type="button">
<div class="h-12 w-12 rounded-full bg-surface-container-highest flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-outline" data-icon="add">add</span>
</div>
</button>
<!-- Right View Slot -->
<button class="relative aspect-square rounded-xl bg-surface-container border-2 border-dashed border-outline-variant hover:border-outline hover:bg-surface-container-high transition-all duration-200 flex flex-col items-center justify-center gap-stack-gap-sm group overflow-hidden" type="button">
<div class="h-12 w-12 rounded-full bg-surface-container-highest flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-outline" data-icon="add">add</span>
</div>
</button>
</div>
<!-- Spacer to push button to bottom if content is short -->
<div class="flex-grow"></div>
<!-- Action Button -->
<div class="w-full mt-auto pt-4">
<button class="w-full h-14 rounded-full font-title-sm text-title-sm flex items-center justify-center transition-all duration-200 bg-[#0F172A] text-white" disabled="" type="button">
                Next
            </button>
</div>
</main>
<!-- BottomNavBar Shared Component -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-white dark:bg-slate-950 border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_12px_rgba(0,0,0,0.04)] flex justify-around items-center h-20 px-2 md:hidden">
<!-- History (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-1.5 hover:text-emerald-500 dark:hover:text-emerald-300 active:scale-90 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest">History</span>
</a>
<!-- Viewer (Active) -->
<a class="flex flex-col items-center justify-center text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-950/40 rounded-2xl px-4 py-1.5 active:scale-90 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="view_in_ar" data-weight="fill" style="font-variation-settings: 'FILL' 1;">view_in_ar</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest">Viewer</span>
</a>
<!-- Account (Inactive) -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-4 py-1.5 hover:text-emerald-500 dark:hover:text-emerald-300 active:scale-90 transition-all duration-200 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest">Account</span>
</a>
</nav>
</body></html>
